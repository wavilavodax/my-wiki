<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>知识图谱</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif}
#graph{width:100%;height:100%}
#header{position:fixed;top:0;left:0;right:0;z-index:10;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(15,23,42,0.9) 60%,transparent);pointer-events:none}
#header h1{font-size:16px;font-weight:600;color:#e2e8f0;letter-spacing:1px}
#header .back{pointer-events:auto;color:#94a3b8;font-size:13px;text-decoration:none;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05)}
#header .back:hover{background:rgba(255,255,255,0.1);color:white}
#legend{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:12px;background:rgba(15,23,42,0.9);padding:8px 20px;border-radius:30px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#94a3b8}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#tip{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:10;font-size:11px;color:#475569;text-align:center;transition:opacity 1s}
</style>
</head>
<body>
<div id="header">
  <h1>知识图谱</h1>
  <a class="back" href="./index.html">← 返回首页</a>
</div>
<div id="graph"></div>
<div id="tip">点击节点跳转 · 滑鼠缩放 · 拖拽移动</div>
<div id="legend">
  <div class="legend-item"><span class="dot" style="background:#60a5fa"></span>AI</div>
  <div class="legend-item"><span class="dot" style="background:#34d399"></span>量化</div>
  <div class="legend-item"><span class="dot" style="background:#fbbf24"></span>开发</div>
  <div class="legend-item"><span class="dot" style="background:#a78bfa"></span>Digest</div>
</div>
<script>
var pages={index:{l:"首页",g:"r"},'ai/README':{l:"AI",g:"a"},'ai/hallucination-and-rag':{l:"AI幻觉与RAG",g:"a"},
'ai/ai-transformation-guide':{l:"AI转型指南",g:"a"},'ai/ai-agent-business':{l:"AI代理",g:"a"},
'ai/enterprise-ai-guide-2026':{l:"AI落地指南",g:"a"},'ai/enterprise-ai-transformation':{l:"AI转型",g:"a"},
'ai/alibaba-whitepaper-2026':{l:"阿里云",g:"a"},'ai/mckinsey-genai-china':{l:"麦肯铭",g:"a"},
'ai/llm-wiki-second-brain':{l:"LLM第二大脑",g:"a"},'ai/second-brain':{l:"第二大脑",g:"a"},
'ai/karpathy':{l:"Karpathy",g:"a"},
'quant/README':{l:"量化",g:"q"},'quant/moss-strategy-design':{l:"Moss策略",g:"q"},
'quant/trend-hunter-pro':{l:"趋势猎手",g:"q"},'quant/range-reaper':{l:"震荡猎手",g:"q"},
'dev/README':{l:"开发",g:"d"},'dev/hermes-multi-agent':{l:"Hermes多智能",g:"d"},
'dev/prompt-cheatsheet':{l:"Prompt速查",g:"d"},'dev/fix-checklist':{l:"修复检查",g:"d"},
'dev/obsidian':{l:"Obsidian",g:"d"},'dev/bidirectional-links':{l:"双向链接",g:"d"},
'digest/README':{l:"Digest",g:"i"},'digest/digest-concept':{l:"Digest概念",g:"i"},'digest/info-sources':{l:"信息源",g:"i"}};
var edges=[["index","ai/README"],["ai/README","ai/hallucination-and-rag"],["ai/README","ai/ai-transformation-guide"],["ai/README","ai/ai-agent-business"],["ai/README","ai/enterprise-ai-guide-2026"],["ai/README","ai/enterprise-ai-transformation"],["ai/README","ai/alibaba-whitepaper-2026"],["ai/README","ai/mckinsey-genai-china"],["ai/README","ai/llm-wiki-second-brain"],["ai/README","ai/second-brain"],["ai/README","ai/karpathy"],["index","quant/README"],["quant/README","quant/moss-strategy-design"],["quant/README","quant/trend-hunter-pro"],["quant/README","quant/range-reaper"],["index","dev/README"],["dev/README","dev/hermes-multi-agent"],["dev/README","dev/prompt-cheatsheet"],["dev/README","dev/fix-checklist"],["dev/README","dev/obsidian"],["dev/README","dev/bidirectional-links"],["index","digest/README"],["digest/README","digest/digest-concept"],["digest/README","digest/info-sources"],["ai/hallucination-and-rag","ai/llm-wiki-second-brain"],["ai/second-brain","dev/bidirectional-links"],["ai/second-brain","dev/obsidian"],["dev/bidirectional-links","dev/obsidian"],["quant/trend-hunter-pro","quant/range-reaper"],["quant/trend-hunter-pro","quant/moss-strategy-design"]];
var nodes=new vis.DataSet(Object.entries(pages).map(function(kv){var k=kv[0],v=kv[1];return{id:k,label:v.l,group:v.g,title:v.l,font:{size:k==='index'?22:v.l.length>6?12:14,color:'#e2e8f0',strokeWidth:2,strokeColor:'#0f172a'},size:k==='index'?36:k.endsWith('/README')?26:18,shape:'dot',borderWidth:0}}));
var edgeData=new vis.DataSet(edges.map(function(e){return{from:e[0],to:e[1],color:{color:'rgba(148,163,184,0.2)'},width:1}}));
var colors={r:{background:'#f8fafc'},a:{background:'#60a5fa'},q:{background:'#34d399'},d:{background:'#fbbf24'},i:{background:'#a78bfa'}};
var net=new vis.Network(document.getElementById('graph'),{nodes:nodes,edges:edgeData},{
  physics:{solver:'forceAtlas2Based',forceAtlas2Based:{gravitationalConstant:-60,centralGravity:0.01,springLength:200,springConstant:0.03,damping:0.5},stabilization:{iterations:150}},
  groups:colors,interaction:{hover:true,tooltipDelay:80,zoomView:true,dragView:true},
  nodes:{shadow:{enabled:true,color:'rgba(0,0,0,0.4)',size:8},font:{face:'sans-serif'}},background:'#0f172a'});
net.on('click',function(p){if(p.nodes.length>0&&p.nodes[0]!=='index')window.location.href='./'+p.nodes[0]+'.html'});
setTimeout(function(){document.getElementById('tip').style.opacity='0'},5000);
</script>
</body></html>
